<!DOCTYPE html>
<html>
<head>
  <title>DB AI SaaS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN SECTION -->
<div class="container" id="loginSection">
  <h1>DB AI</h1>
  <p>Smart AI Assistant untuk Bisnis & Freelance</p>

  <button onclick="loginGoogle()">Login dengan Google</button>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">

  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button>
</div>

<!-- CHAT SECTION -->
<div class="app" id="chatSection" style="display:none;">
  <div class="header">
    <h2>DB AI Assistant</h2>
    <button onclick="logout()">Logout</button>
  </div>

  <div id="chatBox"></div>

  <div class="input-area">
    <input id="userInput" placeholder="Tanyakan sesuatu..." />
    <button onclick="startListening()">🎤</button>
    <button onclick="sendMessage()">Kirim</button>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
